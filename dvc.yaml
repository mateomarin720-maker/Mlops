stages:
  generate_data:
    cmd: python src/generate_data.py --n_rows 50000 --seed 42
    deps:
      - src/generate_data.py
    outs:
      - data/raw/open_rate_dataset.csv

  prepare:
    cmd: python src/prepare.py
    deps:
      - src/prepare.py
      - data/raw/open_rate_dataset.csv
    params:
      - prepare.test_size
      - prepare.seed
    outs:
      - data/processed/train.csv
      - data/processed/test.csv

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/train.csv
      - data/processed/test.csv
    params:
      - train.logistic_regression
      - train.random_forest
    outs:
      - models/best_model.pkl
    metrics:
      - outputs/metrics.json:
          cache: false
